services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-biblio_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgresql://postgres:postgres@db:5432/biblio_db}"
      SECRET_KEY: ${SECRET_KEY:-troque-esta-chave-em-producao}
      PORT: 5000
      PREFERRED_URL_SCHEME: ${PREFERRED_URL_SCHEME:-http}
      ENABLE_HTTPS_HEADERS: ${ENABLE_HTTPS_HEADERS:-false}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      TRUST_PROXY_COUNT: ${TRUST_PROXY_COUNT:-1}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
    ports:
      - "${HOST_PORT:-5000}:5000"

volumes:
  postgres_data:
