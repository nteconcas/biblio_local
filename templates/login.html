{% extends "base.html" %}
{% block content %}
<style>
  body {
    background: url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') no-repeat center center fixed;
    background-size: cover;
    height: 100vh;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .navbar {
    display: none;
  }

  /* Esconde navbar na tela de login para focar no form */
  .container.mt-4 {
    margin-top: 0 !important;
    width: 100%;
    max-width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .login-card {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 20px;
    padding: 3rem;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    color: white;
    width: 90%;
    max-width: 400px;
    text-align: center;
    animation: fadeIn 0.8s ease-out;
  }

  @media (max-width: 576px) {
    .login-card {
      padding: 1.5rem;
      width: 95%;
    }
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(20px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .login-card h2 {
    font-weight: 700;
    margin-bottom: 0.5rem;
    letter-spacing: -1px;
  }

  .login-card p {
    color: rgba(255, 255, 255, 0.8);
    margin-bottom: 2rem;
    font-size: 0.9rem;
  }

  .form-control {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.3);
    color: white;
    border-radius: 10px;
    padding: 12px 15px;
    margin-bottom: 1rem;
    transition: all 0.3s ease;
  }

  .form-control:focus {
    background: rgba(255, 255, 255, 0.2);
    border-color: #fff;
    box-shadow: none;
    color: white;
  }

  .form-control::placeholder {
    color: rgba(255, 255, 255, 0.5);
  }

  .btn-login {
    background: #fff;
    color: #000;
    border: none;
    padding: 12px;
    border-radius: 10px;
    font-weight: 600;
    width: 100%;
    transition: all 0.3s ease;
    margin-top: 1rem;
  }

  .btn-login:hover {
    background: #f0f0f0;
    transform: scale(1.02);
  }

  .admin-info {
    margin-top: 2rem;
    font-size: 0.75rem;
    color: rgba(255, 255, 255, 0.5);
  }

  .admin-info code {
    color: rgba(255, 255, 255, 0.8);
  }
</style>

<div class="login-card">
  <h2>📚 BiblioWeb</h2>
  <p>Bem-vindo ao seu sistema de gestão de acervo</p>

  <form method="POST">
    <input name="username" class="form-control" placeholder="Usuário" required autofocus>
    <input name="password" type="password" class="form-control" placeholder="Senha" required>
    <button class="btn-login">Entrar no Sistema</button>
  </form>

</div>
{% endblock %}
