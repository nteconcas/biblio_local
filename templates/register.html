{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-4">
    <div class="card p-4">
      <h4>📝 Registrar Novo Usuário</h4>
      <form method="POST">
        <input name="username" class="form-control mb-2" placeholder="Nome de usuário" required>
        <input name="password" type="password" class="form-control mb-2" placeholder="Senha" required>
        <button class="btn btn-success w-100">Criar Conta</button>
      </form>
      <a href="/login" class="d-block mt-2 text-center text-decoration-none">← Voltar ao login</a>
    </div>
  </div>
</div>
{% endblock %}
